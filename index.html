<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Simulador de Crédito Profissional</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
        body {
            font-family: 'Inter', sans-serif;
            background: linear-gradient(135deg, #f3f4f6 0%, #e5e7eb 100%);
            min-height: 100vh;
            -webkit-tap-highlight-color: transparent;
        }
        .glass-card {
            background: rgba(255, 255, 255, 0.98);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.3);
            box-shadow: 0 10px 30px -5px rgba(0, 0, 0, 0.05);
        }
        input::-webkit-outer-spin-button,
        input::-webkit-inner-spin-button {
            -webkit-appearance: none;
            margin: 0;
        }
        /* Otimização para toque no celular */
        .touch-target {
            min-height: 48px;
        }
        @media (max-width: 640px) {
            .mobile-grid {
                grid-template-columns: repeat(3, 1fr);
            }
        }
    </style>
</head>
<body class="py-6 px-4 md:py-10">
    <div class="max-w-md mx-auto md:max-w-4xl">
        <!-- Header -->
        <div class="text-center mb-8">
            <h1 class="text-2xl font-extrabold text-gray-900 md:text-4xl mb-2">Simulador de Empréstimo</h1>
            <p class="text-gray-500 text-sm">Rápido, seguro e sem burocracia.</p>
        </div>

        <div class="grid grid-cols-1 md:grid-cols-12 gap-6 items-start">
            <!-- Form Side -->
            <div class="md:col-span-5 glass-card rounded-3xl p-6 md:p-8">
                <div class="space-y-6">
                    <div>
                        <label class="block text-sm font-semibold text-gray-700 mb-2">Quanto você quer receber?</label>
                        <div class="relative">
                            <span class="absolute left-4 top-1/2 -translate-y-1/2 text-gray-400 font-bold">R$</span>
                            <input type="number" id="desiredValue" placeholder="1000,00" inputmode="decimal"
                                class="w-full pl-12 pr-4 py-4 bg-gray-50 border border-gray-200 rounded-2xl focus:ring-2 focus:ring-green-500 focus:border-transparent outline-none transition-all text-2xl font-bold text-gray-800"
                                oninput="calculate()">
                        </div>
                    </div>

                    <div class="pt-2">
                        <label class="block text-sm font-semibold text-gray-700 mb-4">Número de parcelas</label>
                        <div class="grid grid-cols-3 gap-2 mobile-grid" id="installmentGrid">
                            <!-- JS populated -->
                        </div>
                    </div>

                    <button onclick="sendWhatsApp()" class="w-full bg-green-600 hover:bg-green-700 active:scale-95 text-white font-bold py-4 rounded-2xl transition-all shadow-lg shadow-green-200 flex items-center justify-center gap-2 mt-4 touch-target">
                        <svg class="w-6 h-6" fill="currentColor" viewBox="0 0 24 24"><path d="M17.472 14.382c-.297-.149-1.758-.867-2.03-.967-.273-.099-.471-.148-.67.15-.197.297-.767.966-.94 1.164-.173.199-.347.223-.644.075-.297-.15-1.255-.463-2.39-1.475-.883-.788-1.48-1.761-1.653-2.059-.173-.297-.018-.458.13-.606.134-.133.298-.347.446-.52.149-.174.198-.298.298-.497.099-.198.05-.371-.025-.52-.075-.149-.669-1.612-.916-2.207-.242-.579-.487-.5-.669-.51-.173-.008-.371-.01-.57-.01-.198 0-.52.074-.792.372-.272.297-1.04 1.016-1.04 2.479 0 1.462 1.065 2.875 1.213 3.074.149.198 2.096 3.2 5.077 4.487.709.306 1.262.489 1.694.625.712.227 1.36.195 1.871.118.571-.085 1.758-.719 2.006-1.413.248-.694.248-1.289.173-1.413-.074-.124-.272-.198-.57-.347m-5.421 7.403h-.004a9.87 9.87 0 01-5.031-1.378l-.361-.214-3.741.982.998-3.648-.235-.374a9.86 9.86 0 01-1.51-5.26c.001-5.45 4.436-9.884 9.888-9.884 2.64 0 5.122 1.03 6.988 2.898a9.825 9.825 0 012.893 6.994c-.003 5.45-4.437 9.884-9.885 9.884m8.413-18.297A11.815 11.815 0 0012.05 0C5.495 0 .16 5.335.157 11.892c0 2.096.547 4.142 1.588 5.945L.057 24l6.305-1.654a11.882 11.882 0 005.683 1.448h.005c6.554 0 11.89-5.335 11.893-11.893a11.821 11.821 0 00-3.48-8.413z"/></svg>
                        Solicitar via WhatsApp
                    </button>
                </div>
            </div>

            <!-- Result Side -->
            <div class="md:col-span-7 space-y-4">
                <div class="glass-card rounded-3xl p-6 md:p-8 border-l-8 border-green-500">
                    <h3 class="text-xs font-bold text-gray-400 uppercase tracking-widest mb-4 md:mb-6">Resumo da Simulação</h3>
                    
                    <div class="flex flex-col md:flex-row md:justify-between md:items-end gap-4 mb-8">
                        <div>
                            <p class="text-gray-500 text-sm">Total a passar no cartão:</p>
                            <h2 class="text-3xl md:text-4xl font-black text-gray-900" id="totalCardDisplay">R$ 0,00</h2>
                        </div>
                        <div class="md:text-right bg-green-50 p-3 rounded-2xl md:bg-transparent md:p-0">
                            <p class="text-gray-500 text-sm" id="installmentLabel">Parcelas de:</p>
                            <p class="text-xl font-bold text-green-600" id="installmentValueDisplay">R$ 0,00</p>
                        </div>
                    </div>

                    <div class="space-y-4 border-t border-gray-100 pt-6">
                        <div class="flex justify-between text-sm">
                            <span class="text-gray-500">Valor que você recebe:</span>
                            <span class="font-bold text-gray-800" id="netValueDisplay">R$ 0,00</span>
                        </div>
                        <div class="flex justify-between text-sm">
                            <span class="text-gray-500">Plano escolhido:</span>
                            <span class="font-semibold text-gray-800" id="planDisplay">12x</span>
                        </div>
                    </div>
                </div>

                <!-- Footer Mobile Features -->
                <div class="grid grid-cols-2 gap-3">
                    <div class="bg-white p-4 rounded-2xl shadow-sm flex flex-col items-center text-center">
                        <div class="bg-blue-50 p-2 rounded-full mb-2">
                            <svg class="w-5 h-5 text-blue-600" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M13 10V3L4 14h7v7l9-11h-7z"/></svg>
                        </div>
                        <p class="text-[10px] font-bold text-gray-400 uppercase">Liberação</p>
                        <p class="text-xs font-bold text-gray-700">PIX na hora</p>
                    </div>
                    <div class="bg-white p-4 rounded-2xl shadow-sm flex flex-col items-center text-center">
                        <div class="bg-orange-50 p-2 rounded-full mb-2">
                            <svg class="w-5 h-5 text-orange-600" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 12l2 2 4-4m5.618-4.016A11.955 11.955 0 0112 2.944a11.955 11.955 0 01-8.618 3.04A12.02 12.02 0 003 9c0 5.591 3.824 10.29 9 11.622 5.176-1.332 9-6.03 9-11.622 0-1.042-.133-2.052-.382-3.016z"/></svg>
                        </div>
                        <p class="text-[10px] font-bold text-gray-400 uppercase">Segurança</p>
                        <p class="text-xs font-bold text-gray-700">Visa & Master</p>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script>
        const WHATSAPP_NUMBER = "5581985991521";
        const RATES = {
            "Debito": 7.69, "1x": 10, "2x": 11.85, "3x": 12.55, "4x": 13.25,
            "5x": 13.65, "6x": 13.95, "7x": 14.49, "8x": 15.12, "9x": 15.75,
            "10x": 16.25, "11x": 16, "12x": 17.33, "13x": 18.02, "14x": 20.62,
            "15x": 12.22, "16x": 22.81, "17x": 23.90, "18x": 22.74
        };

        let selectedPlan = "12x";
        let globalTotalCard = 0;
        let globalInstallment = 0;
        let globalNetValue = 0;

        function initGrid() {
            const grid = document.getElementById('installmentGrid');
            Object.keys(RATES).forEach(key => {
                const button = document.createElement('button');
                button.innerText = key;
                button.id = `btn-${key}`;
                button.className = "py-4 px-1 rounded-2xl text-sm font-bold border-2 transition-all touch-target " + 
                    (key === selectedPlan ? "bg-green-600 text-white border-green-600 shadow-md shadow-green-100" : "bg-white text-gray-500 border-gray-100");
                
                button.onclick = () => {
                    selectedPlan = key;
                    updateUI();
                };
                grid.appendChild(button);
            });
            calculate();
        }

        function formatCurrency(value) {
            return value.toLocaleString('pt-BR', { style: 'currency', currency: 'BRL' });
        }

        function updateUI() {
            const buttons = document.querySelectorAll('#installmentGrid button');
            buttons.forEach(btn => {
                if (btn.innerText === selectedPlan) {
                    btn.classList.add('bg-green-600', 'text-white', 'border-green-600', 'shadow-md');
                    btn.classList.remove('bg-white', 'text-gray-500', 'border-gray-100');
                } else {
                    btn.classList.remove('bg-green-600', 'text-white', 'border-green-600', 'shadow-md');
                    btn.classList.add('bg-white', 'text-gray-500', 'border-gray-100');
                }
            });
            calculate();
        }

        function calculate() {
            const valInput = document.getElementById('desiredValue').value;
            globalNetValue = parseFloat(valInput) || 0;
            const ratePercentage = RATES[selectedPlan];
            
            globalTotalCard = globalNetValue + (globalNetValue * (ratePercentage / 100));
            
            if (selectedPlan === "Debito" || selectedPlan === "1x") {
                globalInstallment = globalTotalCard;
                document.getElementById('installmentLabel').innerText = "Pagamento único:";
            } else {
                const numInstallments = parseInt(selectedPlan);
                globalInstallment = globalTotalCard / numInstallments;
                document.getElementById('installmentLabel').innerText = `${numInstallments}x de:`;
            }

            document.getElementById('totalCardDisplay').innerText = formatCurrency(globalTotalCard);
            document.getElementById('installmentValueDisplay').innerText = formatCurrency(globalInstallment);
            document.getElementById('netValueDisplay').innerText = formatCurrency(globalNetValue);
            document.getElementById('planDisplay').innerText = selectedPlan === "Debito" ? "Débito" : `Crédito ${selectedPlan}`;
        }

        function sendWhatsApp() {
            if (globalNetValue <= 0) {
                alert("Por favor, insira um valor válido.");
                return;
            }

            const message = `Olá! Realizei uma simulação:\n\n` +
                `*Valor que quero receber:* ${formatCurrency(globalNetValue)}\n` +
                `*Plano:* ${selectedPlan}\n` +
                `*Total no cartão:* ${formatCurrency(globalTotalCard)}\n` +
                `*Parcelas:* ${document.getElementById('installmentLabel').innerText} ${formatCurrency(globalInstallment)}\n\n` +
                `Gostaria de prosseguir com a solicitação!`;

            const encodedMessage = encodeURIComponent(message);
            window.open(`https://wa.me/${WHATSAPP_NUMBER}?text=${encodedMessage}`, '_blank');
        }

        window.onload = initGrid;
    </script>
</body>
</html>
